<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 刷题通</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; }
        .splash-screen.splash-fade-out { opacity: 0; pointer-events: none; }
        .splash-card { text-align: center; animation: splashBounce 0.6s ease-out; }
        @keyframes splashBounce { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
        .splash-icon { font-size: 4rem; margin-bottom: 12px; }
        .splash-title { font-size: 1.8rem; font-weight: 800; color: #1e3a5f; margin-bottom: 4px; }
        .splash-subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 20px; }
        .splash-bar-bg { width: 200px; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; margin: 0 auto; }
        .splash-bar-fill { height: 100%; width: 0; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 2px; animation: splashLoad 1.2s ease-in-out forwards; }
        @keyframes splashLoad { 0% { width: 0; } 50% { width: 70%; } 100% { width: 100%; } }

        .auth-wrap { max-width: 400px; margin: 60px auto; padding: 32px; background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .auth-wrap h1 { font-size: 1.5rem; margin-bottom: 8px; color: #2d3748; }
        .auth-wrap p { color: #718096; font-size: 0.85rem; margin-bottom: 24px; line-height: 1.5; }
        .auth-field { width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem; margin-bottom: 14px; box-sizing: border-box; transition: border-color 0.2s; }
        .auth-field:focus { outline: none; border-color: #3182ce; }
        .auth-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .auth-btn.primary { background: #3182ce; color: #fff; }
        .auth-btn.primary:hover { background: #2b6cb0; }
        .auth-btn.primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-btn.guest { background: #f3f4f6; color: #6b7280; }
        .auth-btn.guest:hover { background: #e5e7eb; }
        .auth-link { display: block; margin-top: 16px; font-size: 0.85rem; color: #718096; }
        .auth-link a { color: #3182ce; text-decoration: none; }
        .auth-link a:hover { text-decoration: underline; }
        .auth-error { color: #e53e3e; font-size: 0.85rem; margin-bottom: 12px; min-height: 1.2em; }
        .auth-hint { font-size: 0.8rem; color: #a0aec0; text-align: left; margin: -10px 0 14px; }
        .code-row { display: flex; gap: 8px; margin-bottom: 14px; }
        .code-row .auth-field { margin-bottom: 0; flex: 1; }
        .code-send-btn { padding: 0 16px; border: 2px solid #3b82f6; border-radius: 10px; background: #fff; color: #3b82f6; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .code-send-btn:hover { background: #3b82f6; color: #fff; }
        .code-send-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #e2e8f0; color: #94a3b8; border-color: #e2e8f0; }
    </style>
</head>
<body>
    <!-- 启动缓冲画面 -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-card">
            <div class="splash-icon">📝</div>
            <h1 class="splash-title">刷题通</h1>
            <p class="splash-subtitle">加载中...</p>
            <div class="splash-bar-bg">
                <div class="splash-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="auth-wrap">
            <h1>📝 注册</h1>
            <p>创建你的刷题通账号<br>注册后数据将保存到云端，换设备不丢失</p>
            <div class="auth-error" id="auth-error"></div>
            <input type="text" class="auth-field" id="username" placeholder="用户名（字母数字）" autocomplete="username" autofocus>
            <input type="email" class="auth-field" id="email" placeholder="邮箱" autocomplete="email">
            <div class="code-row">
                <input type="text" class="auth-field" id="code" placeholder="验证码" autocomplete="off" maxlength="6">
                <button class="code-send-btn" id="send-code-btn" onclick="handleSendCode()">发送验证码</button>
            </div>
            <input type="password" class="auth-field" id="password" placeholder="密码（≥6位，含字母+数字+特殊字符）" autocomplete="new-password">
            <div class="auth-hint">密码必须包含字母、数字和特殊字符，至少6位</div>
            <button class="auth-btn primary" id="register-btn" onclick="handleRegister()">注册</button>
            <div class="auth-link">
                已有账号？<a href="{{ url_for('auth.login') }}">去登录</a>
            </div>
            <div style="margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0;">
                <a href="/app?guest=1" class="auth-btn guest" style="display:block;text-decoration:none;box-sizing:border-box;">👤 访客模式</a>
                <div style="font-size:0.75rem;color:#a0aec0;margin-top:8px;text-align:center;">无需注册，答题数据公开可见</div>
            </div>
        </div>
    </div>

    <script>
        // 启动画面淡出
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const splash = document.getElementById("splash-screen");
                if (splash) {
                    splash.classList.add("splash-fade-out");
                    setTimeout(() => { splash.style.display = "none"; }, 500);
                }
            }, 400);
        });

        let codeCooldown = 0;

        function handleSendCode() {
            const btn = document.getElementById("send-code-btn");
            const errEl = document.getElementById("auth-error");
            const email = document.getElementById("email").value.trim();

            errEl.textContent = "";
            if (!email || !email.includes("@")) { errEl.textContent = "请先填写正确的邮箱"; return; }

            btn.disabled = true;
            btn.textContent = "发送中...";

            fetch("/api/send-code", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email }),
            })
                .then(async (res) => {
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "发送失败");
                    return data;
                })
                .then((data) => {
                    errEl.textContent = "✅ 验证码已发送";
                    errEl.style.color = "#38a169";
                    // 开始 90 秒倒计时
                    codeCooldown = 90;
                    const timer = setInterval(() => {
                        codeCooldown--;
                        btn.textContent = `重新发送(${codeCooldown}s)`;
                        if (codeCooldown <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.textContent = "发送验证码";
                        }
                    }, 1000);
                })
                .catch((err) => {
                    errEl.textContent = err.message;
                    errEl.style.color = "#e53e3e";
                    btn.disabled = false;
                    btn.textContent = "发送验证码";
                });
        }

        function handleRegister() {
            const btn = document.getElementById("register-btn");
            const errEl = document.getElementById("auth-error");
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const code = document.getElementById("code").value.trim();
            const password = document.getElementById("password").value;

            errEl.textContent = "";
            errEl.style.color = "#e53e3e";
            if (!username) { errEl.textContent = "请填写用户名"; return; }
            if (!email) { errEl.textContent = "请填写邮箱"; return; }
            if (!code) { errEl.textContent = "请填写验证码"; return; }
            if (!password) { errEl.textContent = "请填写密码"; return; }

            btn.disabled = true;
            btn.textContent = "注册中...";

            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password, email, code }),
            })
                .then(async (res) => {
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "注册失败");
                    return data;
                })
                .then((data) => {
                    window.location.href = "/app";
                })
                .catch((err) => {
                    errEl.textContent = err.message;
                    btn.disabled = false;
                    btn.textContent = "注册";
                });
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                if (document.activeElement && document.activeElement.id === "code") handleRegister();
                else if (document.activeElement && document.activeElement.id === "email") handleSendCode();
            }
        });
    </script>
</body>
</html>
