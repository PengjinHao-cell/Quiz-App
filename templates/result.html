<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题结果</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 启动缓冲画面 -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-card">
            <div class="splash-icon">📊</div>
            <h1 class="splash-title">刷题通</h1>
            <p class="splash-subtitle">加载结果中...</p>
            <div class="splash-bar-bg">
                <div class="splash-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <header class="quiz-header">
            <a href="{{ url_for('app_main') }}" class="btn btn-back">← 返回题库列表</a>
            <h1>📊 答题结果</h1>
        </header>

        <main>
            <div id="result-summary" class="result-summary loading">
                正在加载结果...
            </div>

            <div id="result-details" class="result-details">
                <!-- 动态填充 -->
            </div>

            <div class="result-actions">
                <a href="{{ url_for('app_main') }}" class="btn btn-primary">返回题库列表</a>
                <button class="btn btn-secondary" onclick="window.history.back()">返回刷题页</button>
                <button class="btn btn-exam" onclick="copyResult()">📤 复制成绩分享</button>
            </div>
            <div id="share-msg" class="msg" style="display:none; margin-top:12px;"></div>
        </main>
    </div>

    <script>
        const RESULT_BANK_ID = "{{ bank_id }}";
    </script>
    <script src="{{ url_for('static', filename='utils.js', v=2) }}"></script>
    <script src="{{ url_for('static', filename='result.js', v=2) }}"></script>
</body>
</html>
