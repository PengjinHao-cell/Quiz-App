<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷题通</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif; padding: 20px; }
        @keyframes welcomeFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .welcome-card { background: #fff; border-radius: 24px; padding: 48px 40px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(59,130,246,0.15); animation: welcomeFadeIn 0.6s ease-out; }
        .welcome-icon { font-size: 4rem; margin-bottom: 16px; animation: welcomeFloat 2.5s ease-in-out infinite; display: inline-block; }
        @keyframes welcomeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .welcome-title { font-size: 2.2rem; font-weight: 800; color: #1e3a5f; letter-spacing: 3px; margin-bottom: 6px; }
        .welcome-sub { font-size: 1rem; color: #3b82f6; margin-bottom: 10px; font-weight: 500; }
        .welcome-desc { font-size: 0.9rem; color: #64748b; margin-bottom: 32px; line-height: 1.8; }
        .welcome-btn { display: block; padding: 14px; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; background: #3b82f6; color: #fff; letter-spacing: 1px; }
        .welcome-btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
        .welcome-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #cbd5e0; font-size: 0.8rem; }
        .welcome-divider::before, .welcome-divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
        .welcome-guest { display: block; padding: 12px; border-radius: 12px; font-size: 0.9rem; color: #64748b; text-decoration: none; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .welcome-guest:hover { background: #f8fafc; border-color: #cbd5e0; color: #3b82f6; }
        @keyframes agreementFadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        .welcome-agreement { margin-top: 20px; font-size: 0.75rem; color: #cbd5e0; text-decoration: none; display: block; text-align: center; transition: color 0.2s; animation: agreementFadeIn 0.8s ease-out 0.5s both; }
        .welcome-agreement:hover { color: #94a3b8; text-decoration: underline; }
        .welcome-footer { margin-top: 16px; font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="welcome-icon">📝</div>
        <h1 class="welcome-title">刷题通</h1>
        <p class="welcome-sub">轻量级智能刷题平台</p>
        <p class="welcome-desc">上传题库 · AI 解析 · 练习模式 · 考试模式<br>错题本 · 收藏 · 学习统计 · 全部免费</p>
        <a href="{{ url_for('auth.login') }}" class="welcome-btn">🚀 登录 / 注册</a>
        <div class="welcome-divider">或者</div>
        <a href="{{ url_for('app_main') }}?guest=1" class="welcome-guest">👤 访客模式体验（无需注册）</a>
        <a href="{{ url_for('agreement') }}" class="welcome-agreement">📋 用户协议</a>
        <div class="welcome-footer">Quiz Master v0.7.1</div>
    </div>
</body>
</html>
