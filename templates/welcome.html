<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷题通</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif; }
        .welcome-wrap { text-align: center; padding: 40px 20px; }
        .welcome-icon { font-size: 5rem; margin-bottom: 16px; animation: welcomeFloat 2.5s ease-in-out infinite; display: inline-block; }
        @keyframes welcomeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .welcome-title { font-size: 3rem; font-weight: 800; color: #fff; letter-spacing: 4px; margin: 0 0 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
        .welcome-sub { font-size: 1.1rem; color: rgba(255,255,255,0.8); margin: 0 0 12px; font-weight: 400; }
        .welcome-desc { font-size: 0.95rem; color: rgba(255,255,255,0.65); margin: 0 0 40px; max-width: 340px; line-height: 1.7; }
        .welcome-btn { display: inline-block; padding: 14px 56px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50px; color: #fff; font-size: 1.2rem; font-weight: 600; text-decoration: none; transition: all 0.3s ease; background: transparent; cursor: pointer; letter-spacing: 2px; }
        .welcome-btn:hover { background: #fff; color: #667eea; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .welcome-footer { margin-top: 48px; font-size: 0.75rem; color: rgba(255,255,255,0.35); }
    </style>
</head>
<body>
    <div class="welcome-wrap">
        <div class="welcome-icon">📝</div>
        <h1 class="welcome-title">刷题通</h1>
        <p class="welcome-sub">轻量级智能刷题平台</p>
        <p class="welcome-desc">上传题库 · AI 解析 · 练习模式 · 考试模式<br>错题本 · 收藏 · 学习统计 · 全部免费</p>
        <a href="{{ url_for('app_main') }}" class="welcome-btn">🚀 进入</a>
        <div class="welcome-footer">Quiz Master v0.5.0</div>
    </div>
</body>
</html>
